# ============================================================================
# RedRob AI Recruiter — Docker Compose
#
# Services:
#   backend  — FastAPI + C++ Ranker + sentence-transformers (port 8000)
#   frontend — React SPA via nginx (port 3000)
#   ollama   — Local LLM for Stage 2 behavioral scoring (port 11434)
#
# Usage:
#   docker compose up --build            # first run — builds all images
#   docker compose up -d                 # detached (background) mode
#   docker compose logs -f backend       # tail backend logs
#   docker compose down                  # stop and remove containers
#   docker compose down -v               # also remove named volumes
# ============================================================================

services:

  # ── Ollama: Local LLM runtime ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: redrob-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama        # persists downloaded models across restarts
    environment:
      - OLLAMA_HOST=0.0.0.0
    # Pull qwen2.5:3b on first run using an init container via entrypoint script
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull qwen2.5:3b
        wait
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s   # allow time for model pull on first run

  # ── Backend: FastAPI Inverted Cascade Funnel ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: redrob-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount the candidate dataset at runtime — keeps the image data-agnostic
      - ./backend/data:/app/data:ro
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=qwen2.5:3b
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend: React SPA served via nginx ────────────────────────────────
  frontend:
    build:
      context: ./frontend/ui
      dockerfile: Dockerfile
      args:
        # When running in Docker, the browser talks to the backend via the host machine.
        # Use the host's mapped port so requests reach the backend container.
        VITE_API_URL: http://localhost:8000
    container_name: redrob-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

# ── Named Volumes ────────────────────────────────────────────────────────
volumes:
  ollama-data:
    driver: local
